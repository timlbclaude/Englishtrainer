name: ETA - Neues Wort hinzufuegen

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  add-word:
    # Nur ausloesen, wenn der Issue-Titel mit "ETA:" beginnt
    if: startsWith(github.event.issue.title, 'ETA:')
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install anthropic openpyxl requests

      - name: Wort hinzufuegen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/eta_process.py

      - name: Aenderungen committen
        run: |
          git config user.name "ETA Bot"
          git config user.email "eta-bot@users.noreply.github.com"
          git add index.html vokabeln.xlsx || true
          if ! git diff --cached --quiet; then
            git commit -m "ETA: Neues Wort aus Issue #${{ github.event.issue.number }}"
            git push
          else
            echo "Keine Aenderungen zum Committen."
          fi

      - name: Issue schliessen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Wort wurde erfolgreich aufgenommen. Die App aktualisiert sich in ca. 1 Minute." --repo ${{ github.repository }}
